services:
 db:
    image: postgres:16
    container_name: game-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: transcendence
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - backend
  
  nginx:
    image: nginx:alpine
    container_name: game-nginx
    ports:
      - "3001:80"
      - "3443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../certs/server/server.crt:/etc/nginx/certs/localhost.pem:ro
      - ../certs/server/server.key:/etc/nginx/certs/localhost-key.pem:ro
      - ./backend/uploads:/app/uploads
      - ./ssl:/etc/nginx/ssl:ro
      - ./build:/usr/share/nginx/html:ro   # Build-Ordner für statische Files
    depends_on:
      - admin_service
      - auth_service
      - social_service
      - game_service
      - tournament_service
    networks:
      - backend

networks:
  backend:
    driver: bridge