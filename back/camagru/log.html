<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<title>Log In</title>
</head>

<body>
	<header>
		<span>
			<h1>Camagru</h1>
			<nav>
				<a href="gallery.html">Gallery</a>
			</nav>
		</span>
	</header>
	<main>
		<h1>Log In:</h1>

		<section>
			<form action="login" method="get" id="login">
				<input type="text" name="credentials" placeholder="email or username" id="inputCred" required>
				<input type="password" name="password" placeholder="Password (nums,low up case)" id="inputPassword" required>
				<button type="submit" id="buttonLog">Log In</button>
				<a href="forgotPass.html">Forgot password</a>
			</form>
			<section id="forgotPass">
				<p>Not registered?</p>
				<a href="register.html">Create a new account</a>
			</section>
		</section>

	</main>
</body>
