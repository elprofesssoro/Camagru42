<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Reset Password</title>
	<link rel="stylesheet" href="../styles/common.css">
	<link rel="stylesheet" href="../styles/log.css">
	<script src="../javascript/api.js" defer></script>
	<script src="../javascript/inputValidation.js" defer></script>
	<script src="../javascript/resetPass.js" defer></script>
</head>

<body>
	<main>
		<h1>Reset Password</h1>
		<form action="reset-password" method="POST">
			<label for="password">New Password:</label>
			<input type="password" id="password" name="password" required>
			<label for="confirmPassword">Confirm New Password:</label>
			<input type="password" id="confirmPassword" name="confirmPassword" required>
			<button type="submit">Reset Password</button>
			<p>Password must be at least 5 characters long, contain a number, and contain an uppercase letter.</p>
		</form>
	</main>
</body>

</html>
