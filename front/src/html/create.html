<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<title>Create</title>
	<link rel="stylesheet" href="../styles/header.css">
	<link rel="stylesheet" href="../styles/create.css">
	<link rel="stylesheet" href="../styles/footer.css">
	<script src="../javascript/create.js" defer></script>
</head>

<body>
	<header>
		<span>
			<h1>Create your image</h1>
			<nav>
				<a href="gallery.html">Gallery</a>
				<button id="logoutButton">Log out</button>
			</nav>
		</span>
	</header>

	<main class="creation-studio">
		<section class="main-editor">
			<h1>Take an image</h1>
			<div class="camera-wrapper">
				<div class="camera-feed">
					<video id="video-feed" autoplay>Video stream is not available</video>
					<div id="overlay-layer"></div>
				</div>

				<div class="controls-area">
					<button id="capture-btn" disabled>Capture</button>
					<button id="post-btn" disabled>Post</button>
					<div class="upload-wrapper">
						<label for="upload-file" class="upload-label">Upload image</label>
						<input type="file" id="upload-file" accept="image/*">
					</div>
					<button id="reset-btn">Reset</button>
				</div>
			</div>

			<section class="filter-section">
				<h3>Superposable Images</h3>
				<div class="filter-list">
					<label class="filter-item">
						<input type="radio" name="filter" value="filter1">
						<img src="../../pub/transparency.png" alt="Filter 1">
					</label>
					<label class="filter-item">
						<input type="radio" name="filter" value="filter2">
						<img src="../../pub/transparency.png" alt="Filter 2">
					</label>
					<label class="filter-item">
						<input type="radio" name="filter" value="filter3">
						<img src="../../pub/transparency.png" alt="Filter 3">
					</label>
					<label class="filter-item">
						<input type="radio" name="filter" value="filter4">
						<img src="../../pub/transparency.png" alt="Filter 4">
					</label>
					<label class="filter-item">
						<input type="radio" name="filter" value="filter4">
						<img src="../../pub/transparency.png" alt="Filter 4">
					</label>
					<label class="filter-item">
						<input type="radio" name="filter" value="filter4">
						<img src="../../pub/transparency.png" alt="Filter 4">
					</label>
					<label class="filter-item">
						<input type="radio" name="filter" value="filter4">
						<img src="../../pub/transparency.png" alt="Filter 4">
					</label>
					<label class="filter-item">
						<input type="radio" name="filter" value="filter4">
						<img src="../../pub/transparency.png" alt="Filter 4">
					</label>
					<label class="filter-item">
						<input type="radio" name="filter" value="filter4">
						<img src="../../pub/transparency.png" alt="Filter 4">
					</label>
					<label class="filter-item">
						<input type="radio" name="filter" value="filter4">
						<img src="../../pub/transparency.png" alt="Filter 4">
					</label>
				</div>
			</section>
		</section>

		<aside class="side-gallery">
			<h3>Your Pictures</h3>
			<div class="thumbnail-list">
				<div class="thumbnail">
					<img src="../../pub/test2.png" alt="My Creation 1">
					<button class="delete-btn">Delete</button>
				</div>
				<div class="thumbnail">
					<img src="../../pub/test2.png" alt="My Creation 2">
					<button class="delete-btn">Delete</button>
				</div>
				<div class="thumbnail">
					<img src="../../pub/test2.png" alt="My Creation 3">
					<button class="delete-btn">Delete</button>
				</div>
			</div>
		</aside>
	</main>

	<footer>
		<p>Maystern.Games</p>
	</footer>
</body>

</html>
