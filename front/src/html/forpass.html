<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<title>Reset Password</title>
	<link rel="stylesheet" href="../styles/common.css">
	<script src="../javascript/inputValidation.js" defer></script>
	<script src="../javascript/reset.js" defer></script>
</head>

<body>
	<header>
		<h1>Reset your password</h1>
	</header>

	<main>
		<section>
			<form action="forgotPass" method="post">
				<input type="email" name="email" placeholder="your@email.com" required id="inputEmail">
				<button type="submit">Send recovery link</button>
			</form>
		</section>
	</main>
</body>
