<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<title>EMAIL</title>
	<link href="../styles/esent.css" rel="stylesheet" />
	<link href="../styles/common.css" rel="stylesheet" />
	<script src="../javascript/inputValidation.js" defer></script>
	<script src="../javascript/api.js" defer></script>
	<script src="../javascript/esent.js" defer></script>
</head>

<body>
	<header>
		<h1>Email was sent</h1>
	</header>

	<main>
		<section>
			<h2>Your email was sent. Check your mail.</h2>
			<form id="resend-form">
				<input type="email" id="resend-email" name="email" placeholder="Enter your email to resend" required />
				<button type="submit" id="resend-btn">Resend Email</button>
			</form>
		</section>
	</main>
</body>
