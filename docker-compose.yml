services:
  db:
    image: postgres:16
    container_name: camagru-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./back/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    networks:
      - camagru-net

  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: camagru-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      EMAIL_HOST: ${EMAIL_HOST}
      PASSWORD_HOST: ${PASSWORD_HOST}
      EMAIL_IP: ${EMAIL_IP}
      PUBLIC_DIR: /app/pub
    volumes:
      - ./pub:/app/pub
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - camagru-net

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: camagru-frontend
    restart: unless-stopped
    volumes:
      - ./pub:/usr/share/nginx/html/pub:ro
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - camagru-net

networks:
  camagru-net:
    driver: bridge
